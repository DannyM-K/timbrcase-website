<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Arial, sans-serif">
  <style>
    .wire { stroke: #111; stroke-width: 2; fill: none; }
    .comp { stroke: #111; stroke-width: 2; fill: #fff; }
    .label { font-size: 14px; fill: #111; }
    .small { font-size: 12px; fill: #333; }
    .big { font-size: 20px; font-weight: 700; fill: #111; }
    .red { fill: #c0282d; }
    .blue { fill: #1f4ea8; }
    .ic { fill: #f4f4f4; stroke: #111; stroke-width: 2; }
    .pin { fill: #111; }
    .dot { fill: #111; }
    .note { font-size: 12px; fill: #444; }
    .box { fill: #fafafa; stroke: #333; stroke-width: 1; }
  </style>

  <!-- Title -->
  <text x="40" y="38" class="big">Toggle-Schalter mit CD4013 — 1 Taster schaltet Lampe AN / AUS</text>
  <text x="40" y="60" class="small">Versorgung 3,7 V (Li-Ion) · Lampe = 3 V/100 mA · 5 Bauteile + Taster</text>

  <!-- ==== Power rails ==== -->
  <!-- + rail -->
  <line x1="80" y1="120" x2="1020" y2="120" class="wire" stroke="#c0282d"/>
  <text x="40" y="115" class="label red">+3,7 V</text>
  <circle cx="80" cy="120" r="6" class="comp" stroke="#c0282d"/>
  <!-- GND rail -->
  <line x1="80" y1="660" x2="1020" y2="660" class="wire"/>
  <text x="40" y="665" class="label">GND</text>
  <!-- ground symbol -->
  <line x1="80" y1="660" x2="80" y2="685" class="wire"/>
  <line x1="65" y1="685" x2="95" y2="685" class="wire"/>
  <line x1="70" y1="692" x2="90" y2="692" class="wire"/>
  <line x1="75" y1="699" x2="85" y2="699" class="wire"/>

  <!-- Battery symbol -->
  <line x1="80" y1="120" x2="80" y2="160" class="wire"/>
  <line x1="60" y1="160" x2="100" y2="160" class="wire" stroke-width="3"/>
  <line x1="70" y1="170" x2="90" y2="170" class="wire"/>
  <line x1="60" y1="180" x2="100" y2="180" class="wire" stroke-width="3"/>
  <line x1="70" y1="190" x2="90" y2="190" class="wire"/>
  <line x1="80" y1="190" x2="80" y2="660" class="wire"/>
  <text x="105" y="180" class="small">Li-Ion 3,7 V</text>

  <!-- ==== CD4013 IC ==== -->
  <rect x="380" y="220" width="220" height="240" class="ic" rx="4"/>
  <text x="490" y="248" text-anchor="middle" class="label" font-weight="700">CD4013</text>
  <text x="490" y="264" text-anchor="middle" class="small">Dual D Flip-Flop</text>

  <!-- IC pins (left side) -->
  <!-- Pin 1: Q -->
  <line x1="360" y1="290" x2="380" y2="290" class="wire"/>
  <text x="388" y="294" class="small">1  Q</text>
  <!-- Pin 2: Q̄ -->
  <line x1="360" y1="320" x2="380" y2="320" class="wire"/>
  <text x="388" y="324" class="small">2  Q̄</text>
  <!-- Pin 3: CLK -->
  <line x1="360" y1="350" x2="380" y2="350" class="wire"/>
  <text x="388" y="354" class="small">3  CLK</text>
  <!-- Pin 4: SET -->
  <line x1="360" y1="380" x2="380" y2="380" class="wire"/>
  <text x="388" y="384" class="small">4  SET</text>
  <!-- Pin 5: D -->
  <line x1="360" y1="410" x2="380" y2="410" class="wire"/>
  <text x="388" y="414" class="small">5  D</text>
  <!-- Pin 6: RESET -->
  <line x1="360" y1="440" x2="380" y2="440" class="wire"/>
  <text x="388" y="444" class="small">6  RESET</text>
  <!-- Pin 7: Vss -->
  <line x1="380" y1="450" x2="380" y2="460" class="wire"/>
  <text x="430" y="478" class="small">Pin 7 (Vss / GND)</text>

  <!-- IC pins (right side) -->
  <!-- Pin 14: Vdd -->
  <line x1="600" y1="240" x2="620" y2="240" class="wire"/>
  <text x="540" y="244" class="small" text-anchor="end">Pin 14 (Vdd)</text>
  <!-- (other half of IC unused) -->
  <text x="595" y="290" class="small" text-anchor="end" fill="#888">8–13: 2. FF unbenutzt</text>

  <!-- Vdd to + rail -->
  <line x1="620" y1="240" x2="620" y2="120" class="wire"/>
  <circle cx="620" cy="120" r="3" class="dot"/>

  <!-- Vss to GND -->
  <line x1="380" y1="460" x2="380" y2="660" class="wire"/>
  <circle cx="380" cy="660" r="3" class="dot"/>

  <!-- ==== SET (pin 4) and RESET (pin 6) tied to GND ==== -->
  <line x1="360" y1="380" x2="320" y2="380" class="wire"/>
  <line x1="320" y1="380" x2="320" y2="660" class="wire"/>
  <circle cx="320" cy="660" r="3" class="dot"/>

  <line x1="360" y1="440" x2="340" y2="440" class="wire"/>
  <line x1="340" y1="440" x2="340" y2="660" class="wire"/>
  <circle cx="340" cy="660" r="3" class="dot"/>

  <text x="260" y="395" class="note">SET → GND</text>
  <text x="250" y="455" class="note">RESET → GND</text>

  <!-- ==== Q̄ (pin 2) tied to D (pin 5) — toggle config ==== -->
  <path d="M 360 320 L 280 320 L 280 410 L 360 410" class="wire" stroke="#1f4ea8"/>
  <circle cx="360" cy="320" r="3" class="dot"/>
  <circle cx="360" cy="410" r="3" class="dot"/>
  <text x="200" y="368" class="note blue">Q̄ → D</text>
  <text x="200" y="383" class="note blue">(macht Toggle)</text>

  <!-- ==== CLK input network: Pull-up R, debounce C, Taster ==== -->
  <!-- CLK node lives at pin 3 (x=360,y=350). Run wire left to junction at x=200 -->
  <line x1="360" y1="350" x2="200" y2="350" class="wire"/>
  <circle cx="200" cy="350" r="3" class="dot"/>

  <!-- R: 10k pull-up from CLK to + rail -->
  <line x1="200" y1="350" x2="200" y2="220" class="wire"/>
  <rect x="188" y="170" width="24" height="50" class="comp"/>
  <line x1="200" y1="120" x2="200" y2="170" class="wire"/>
  <circle cx="200" cy="120" r="3" class="dot"/>
  <text x="220" y="200" class="label">R1 = 10 kΩ</text>
  <text x="220" y="215" class="small">(Pull-up)</text>

  <!-- C: 100 nF from CLK to GND (debounce) -->
  <line x1="200" y1="350" x2="150" y2="350" class="wire"/>
  <line x1="150" y1="350" x2="150" y2="430" class="wire"/>
  <line x1="135" y1="430" x2="165" y2="430" class="wire" stroke-width="3"/>
  <line x1="135" y1="442" x2="165" y2="442" class="wire" stroke-width="3"/>
  <line x1="150" y1="442" x2="150" y2="660" class="wire"/>
  <circle cx="150" cy="660" r="3" class="dot"/>
  <text x="40" y="430" class="label">C1 = 100 nF</text>
  <text x="40" y="445" class="small">(Entprellung)</text>

  <!-- Taster from CLK to GND -->
  <line x1="200" y1="350" x2="240" y2="350" class="wire"/>
  <line x1="240" y1="350" x2="240" y2="540" class="wire"/>
  <!-- pushbutton symbol -->
  <line x1="240" y1="540" x2="240" y2="555" class="wire"/>
  <line x1="220" y1="555" x2="260" y2="555" class="wire"/>
  <line x1="230" y1="545" x2="250" y2="535" class="wire"/>
  <circle cx="225" cy="555" r="2" class="dot"/>
  <circle cx="255" cy="555" r="2" class="dot"/>
  <line x1="240" y1="565" x2="240" y2="660" class="wire"/>
  <circle cx="240" cy="660" r="3" class="dot"/>
  <text x="270" y="555" class="label">TASTER</text>
  <text x="270" y="570" class="small">(NO, kurz drücken)</text>

  <!-- ==== Q (pin 1) → Gate of AO3413 P-MOSFET ==== -->
  <line x1="360" y1="290" x2="700" y2="290" class="wire" stroke="#1f4ea8"/>
  <text x="500" y="282" class="small blue">Q (Toggle-Ausgang)</text>

  <!-- AO3413 P-MOSFET symbol — high-side switch -->
  <!-- We invert: Q HIGH → P-MOSFET via inverter? 
       Actually for a P-MOS high-side: Source at V+, Gate pulled low to turn ON.
       Direct Q drive: Q=HIGH (3.7V) → V_GS = 0 → OFF; Q=LOW (0V) → V_GS = -3.7V → ON.
       So lamp is ON when Q is LOW. Toggle still works (each click flips).
       To make "Q HIGH = lamp ON" we'd need an inverter. For simplicity drive Q̄ instead.
       Better: drive Gate from Q̄. We already use Q̄→D. So tap Q (pin 1) — and document that lamp ON corresponds to Q=LOW. 
       Simpler for the diagram: use Q directly and add a note. -->
  
  <!-- Gate -->
  <line x1="700" y1="290" x2="700" y2="340" class="wire"/>
  <text x="710" y="335" class="small">G</text>
  <!-- MOSFET body -->
  <line x1="700" y1="340" x2="740" y2="340" class="wire"/>
  <line x1="740" y1="320" x2="740" y2="360" class="wire" stroke-width="3"/>
  <line x1="745" y1="300" x2="745" y2="380" class="wire"/>
  <!-- Source (top) to V+ -->
  <line x1="745" y1="300" x2="780" y2="300" class="wire"/>
  <line x1="780" y1="300" x2="780" y2="120" class="wire"/>
  <circle cx="780" cy="120" r="3" class="dot"/>
  <text x="755" y="295" class="small">S</text>
  <!-- Drain (bottom) to lamp -->
  <line x1="745" y1="380" x2="780" y2="380" class="wire"/>
  <line x1="780" y1="380" x2="780" y2="430" class="wire"/>
  <text x="755" y="395" class="small">D</text>
  <!-- arrow on P-MOS (pointing outward) -->
  <polygon points="740,340 730,335 730,345" fill="#111"/>

  <!-- Component label -->
  <rect x="660" y="240" width="90" height="22" class="box"/>
  <text x="705" y="256" text-anchor="middle" class="small" font-weight="700">Q1: AO3413</text>
  <text x="705" y="272" text-anchor="middle" class="small">P-MOSFET</text>

  <!-- ==== Lamp ==== -->
  <circle cx="780" cy="470" r="40" class="comp" fill="#fff8d8"/>
  <line x1="755" y1="445" x2="805" y2="495" class="wire" stroke="#a07000"/>
  <line x1="755" y1="495" x2="805" y2="445" class="wire" stroke="#a07000"/>
  <text x="830" y="465" class="label">Lampe</text>
  <text x="830" y="482" class="small">3 V / ~100 mA</text>
  <text x="830" y="497" class="small">(oder LED + R)</text>
  <line x1="780" y1="510" x2="780" y2="660" class="wire"/>
  <circle cx="780" cy="660" r="3" class="dot"/>

  <!-- ==== Legend / Bauteile ==== -->
  <rect x="880" y="160" width="200" height="270" class="box"/>
  <text x="980" y="183" text-anchor="middle" class="label" font-weight="700">BAUTEILE</text>
  <text x="895" y="210" class="small"><tspan font-weight="700">U1</tspan>  CD4013 (SOIC-14)</text>
  <text x="895" y="232" class="small"><tspan font-weight="700">Q1</tspan>  AO3413 P-MOSFET (SOT-23)</text>
  <text x="895" y="254" class="small"><tspan font-weight="700">R1</tspan>  10 kΩ (0603)</text>
  <text x="895" y="276" class="small"><tspan font-weight="700">C1</tspan>  100 nF (0603, X7R)</text>
  <text x="895" y="298" class="small"><tspan font-weight="700">SW1</tspan>  Taster, NO</text>
  <text x="895" y="320" class="small"><tspan font-weight="700">L1</tspan>  Lampe 3 V</text>
  <text x="895" y="342" class="small"><tspan font-weight="700">BATT</tspan> Li-Ion 3,7 V</text>
  <line x1="895" y1="358" x2="1065" y2="358" class="wire" stroke="#bbb"/>
  <text x="895" y="378" class="small" font-weight="700">Funktion:</text>
  <text x="895" y="395" class="small">jeder Tasterklick → Q kippt</text>
  <text x="895" y="410" class="small">Q LOW → P-MOSFET leitet</text>
  <text x="895" y="425" class="small">→ Lampe AN / AUS / AN ...</text>

  <!-- ==== Function block ==== -->
  <rect x="40" y="520" width="380" height="125" class="box"/>
  <text x="55" y="544" class="label" font-weight="700">SO FUNKTIONIERT'S</text>
  <text x="55" y="568" class="small">1. Pin 5 (D) ist mit Pin 2 (Q̄) verbunden → bei jedem CLK-Edge</text>
  <text x="55" y="582" class="small">    übernimmt Q den invertierten Wert: Q toggelt.</text>
  <text x="55" y="601" class="small">2. R1 (10 kΩ) hält CLK normal HIGH. C1 (100 nF) entprellt</text>
  <text x="55" y="615" class="small">    den Taster (τ ≈ 1 ms).</text>
  <text x="55" y="634" class="small">3. Q steuert Gate von Q1. Q LOW → P-MOS leitet → Lampe an.</text>

  <!-- ==== Hinweis-Block ==== -->
  <rect x="440" y="520" width="420" height="125" class="box"/>
  <text x="455" y="544" class="label" font-weight="700">HINWEISE</text>
  <text x="455" y="568" class="small">• Funktioniert von 3 V bis 15 V — perfekt für Li-Ion 3,7 V.</text>
  <text x="455" y="585" class="small">• AO3413 ist Logic-Level → schaltet bei V_GS = -3,7 V voll durch.</text>
  <text x="455" y="602" class="small">• Beim ersten Einschalten ist Q-Zustand undefiniert — drück</text>
  <text x="455" y="616" class="small">    1× den Taster, dann ist's konsistent. (Optional: 100 kΩ von</text>
  <text x="455" y="630" class="small">    Pin 4/SET auf GND + 100 nF auf V+ → Power-on-Reset.)</text>

</svg>
